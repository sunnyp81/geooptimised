<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>GEOoptimised — Get Cited by AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com?plugins=typography"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
        display: ['"Space Grotesk"', 'Inter', 'sans-serif'],
        mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
      },
      colors: {
        ink: {
          950: '#06090F',
          900: '#0A0F1E',
          800: '#11172A',
          700: '#1A2138',
          600: '#252D48',
          500: '#3A4564',
          400: '#5A6585',
          300: '#8B95A8',
          200: '#C4CCDB',
          100: '#E2E8F0',
          50:  '#F0F4F8',
        },
      },
      letterSpacing: { tightish: '-0.018em', tighter2: '-0.03em' },
      boxShadow: {
        glow: '0 0 0 1px rgba(0,229,204,.25), 0 12px 40px -12px rgba(0,229,204,.35)',
      },
    },
  },
};
</script>
<style>
  :root {
    --bg: #0A0F1E;
    --bg-2: #11172A;
    --bg-3: #161D33;
    --line: #1F2740;
    --line-soft: #19203A;
    --text: #F0F4F8;
    --muted: #8B95A8;
    --accent: #00E5CC;
    --accent-2: #F5A623;
    --accent-glow: 0,229,204;
  }
  html, body { background: var(--bg); color: var(--text); }
  body {
    font-family: Inter, ui-sans-serif, system-ui;
    font-feature-settings: "ss01","cv11";
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .font-display { font-family: "Space Grotesk", Inter, sans-serif; letter-spacing: -0.02em; }
  .font-mono { font-family: "JetBrains Mono", ui-monospace, monospace; }

  /* hairlines */
  .hair { border-color: var(--line); }
  .hair-soft { border-color: var(--line-soft); }

  /* grid bg */
  .bg-grid {
    background-image:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size: 56px 56px;
  }
  .bg-grid-fine {
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 24px 24px;
  }

  /* radial fade for hero */
  .hero-fade {
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(var(--accent-glow), .14), transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 30%, rgba(124,92,255,.10), transparent 60%);
  }

  /* gradient text */
  .grad-text {
    background: linear-gradient(180deg, #ffffff 0%, #B6C0D6 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .accent-text { color: var(--accent); }

  /* link underline reveal */
  .uline { position: relative; }
  .uline::after {
    content: ""; position: absolute; left: 0; right: 100%; bottom: -2px;
    height: 1px; background: currentColor; opacity: .6;
    transition: right .35s ease;
  }
  .uline:hover::after { right: 0; }

  /* button */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 16px; border-radius: 10px;
    font-weight: 500; font-size: 14px; letter-spacing: -0.005em;
    transition: transform .15s ease, background .15s ease, border-color .15s ease;
    white-space: nowrap;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    background: var(--accent);
    color: #00231F;
    box-shadow: 0 0 0 1px rgba(0,229,204,.4), 0 8px 30px -10px rgba(0,229,204,.5);
  }
  .btn-primary:hover { background: #2EF0D8; }
  .btn-ghost {
    background: rgba(255,255,255,.03);
    color: var(--text);
    border: 1px solid var(--line);
  }
  .btn-ghost:hover { background: rgba(255,255,255,.06); border-color: #2A355A; }

  /* card */
  .card {
    background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0));
    border: 1px solid var(--line);
    border-radius: 16px;
  }
  .card-hover { transition: border-color .2s ease, transform .2s ease, background .2s ease; }
  .card-hover:hover { border-color: rgba(0,229,204,.35); background: linear-gradient(180deg, rgba(0,229,204,.04), rgba(255,255,255,0)); }

  /* eyebrow */
  .eyebrow {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--accent);
  }

  /* typing cursor */
  .cursor-blink::after {
    content: ""; display: inline-block; width: 8px; height: 1.05em;
    margin-left: 2px; background: var(--accent); vertical-align: -2px;
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  @keyframes pulseDot {
    0%, 100% { opacity: .35; transform: scale(.95); }
    50% { opacity: 1; transform: scale(1.05); }
  }
  .pulse-dot { animation: pulseDot 2.2s ease-in-out infinite; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #1F2740; border-radius: 6px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: #2A355A; }

  /* selection */
  ::selection { background: rgba(0,229,204,.35); color: #fff; }

  /* hero animated gradient mesh */
  .mesh-orb {
    position: absolute; border-radius: 50%; filter: blur(60px); opacity: .55;
    pointer-events: none;
  }
  .mesh-1 { width: 520px; height: 520px; background: radial-gradient(circle, #00E5CC 0%, transparent 60%); left: -10%; top: -10%;
    animation: float1 16s ease-in-out infinite; }
  .mesh-2 { width: 480px; height: 480px; background: radial-gradient(circle, #7C5CFF 0%, transparent 60%); right: -8%; top: 10%;
    animation: float2 20s ease-in-out infinite; }
  .mesh-3 { width: 380px; height: 380px; background: radial-gradient(circle, #F5A623 0%, transparent 60%); left: 30%; bottom: -20%;
    animation: float3 24s ease-in-out infinite; opacity: .25; }
  @keyframes float1 { 50% { transform: translate(40px, 30px) scale(1.05); } }
  @keyframes float2 { 50% { transform: translate(-30px, 40px) scale(.95); } }
  @keyframes float3 { 50% { transform: translate(20px, -30px) scale(1.1); } }

  /* prose tweaks for dark */
  .prose-dark { color: #C4CCDB; font-size: 17px; line-height: 1.7; }
  .prose-dark h2 { color: #fff; font-family: "Space Grotesk"; font-weight: 600; letter-spacing: -0.02em; font-size: 28px; margin: 2.2em 0 .7em; }
  .prose-dark h3 { color: #fff; font-family: "Space Grotesk"; font-weight: 600; font-size: 20px; margin: 1.8em 0 .5em; }
  .prose-dark p { margin: 0 0 1.1em; }
  .prose-dark a { color: var(--accent); text-decoration: none; border-bottom: 1px solid rgba(0,229,204,.35); }
  .prose-dark a:hover { border-color: var(--accent); }
  .prose-dark strong { color: #fff; font-weight: 600; }
  .prose-dark ul { margin: 0 0 1.2em; padding-left: 0; list-style: none; }
  .prose-dark ul li { padding-left: 1.4em; position: relative; margin-bottom: .5em; }
  .prose-dark ul li::before { content: ""; position: absolute; left: 0; top: .65em; width: 6px; height: 6px; background: var(--accent); border-radius: 1px; }
  .prose-dark code { background: var(--bg-2); color: #BFE9E1; padding: 2px 6px; border-radius: 4px; font-size: 14px; border: 1px solid var(--line); }

  /* tweaks scoping */
  body.is-tweaks-open .twk-panel { display: flex; }

  /* AI answer card subtle stripe */
  .answer-stripe {
    background: linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,0));
  }

  /* Anchor reset under fixed nav */
  .anchor-top { scroll-margin-top: 90px; }

  /* utility */
  .container-wide { max-width: 1280px; margin: 0 auto; padding-left: 24px; padding-right: 24px; }
  @media (min-width: 768px) { .container-wide { padding-left: 40px; padding-right: 40px; } }

  /* fade-in on mount */
  .fade-in { animation: fadeUp .7s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } }

  /* TOC sticky */
  .toc a { display: block; padding: 6px 12px; border-left: 1px solid var(--line); color: var(--muted); font-size: 13px; line-height: 1.4; transition: all .15s ease; }
  .toc a:hover { color: #fff; border-color: #2A355A; }
  .toc a.active { color: var(--accent); border-color: var(--accent); }

  /* form */
  .input {
    width: 100%; padding: 12px 14px; border-radius: 10px;
    background: rgba(255,255,255,.025);
    border: 1px solid var(--line);
    color: var(--text); font-size: 15px;
    transition: border-color .15s ease, background .15s ease;
  }
  .input:focus { outline: none; border-color: var(--accent); background: rgba(0,229,204,.03); }
  .input::placeholder { color: #5A6585; }

  /* dot grid */
  .dot-grid {
    background-image: radial-gradient(rgba(255,255,255,.12) 1px, transparent 1px);
    background-size: 22px 22px;
  }

  /* nav glass */
  .nav-glass {
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    background: rgba(10,15,30,.7);
    border-bottom: 1px solid var(--line-soft);
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="page-home.jsx"></script>
  <script type="text/babel" src="page-root.jsx"></script>
  <script type="text/babel" src="page-node.jsx"></script>
  <script type="text/babel" src="page-seed.jsx"></script>
  <script type="text/babel" src="page-contact.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
